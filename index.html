<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recall — Daily Vocabulary</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;}
.wrap{max-width:660px;margin:0 auto;padding:1.5rem 1rem 5rem;}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;}
.app-name{font-size:22px;font-weight:600;color:#1a1a18;letter-spacing:-0.3px;}
.app-date{font-size:12px;color:#888;margin-top:3px;}
.streak-pill{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:8px 14px;font-size:14px;font-weight:600;color:#1a1a18;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.flame{color:#e07b2a;font-size:16px;}
.streak-sub{font-size:11px;font-weight:400;color:#888;}
.nav{display:flex;border-bottom:1.5px solid #e0dfd8;margin-bottom:1.75rem;}
.nb{flex:1;background:none;border:none;padding:11px 4px;font-size:13px;font-weight:400;color:#888;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:color .15s;}
.nb:hover{color:#1a1a18;}
.nb.on{color:#1a1a18;font-weight:600;border-bottom-color:#1a1a18;}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:14px;padding:1.4rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.card.featured{border-color:#bbb;}
.card.dim{opacity:.6;}
.wtop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.85rem;}
.wname{font-size:28px;font-weight:600;color:#1a1a18;letter-spacing:-0.5px;line-height:1.1;}
.wname.sm{font-size:19px;}
.phonetic{font-size:12px;color:#888;margin-top:3px;font-style:italic;}
.pos-badge{font-size:11px;padding:3px 10px;background:#f0efe8;border:1px solid #e0dfd8;border-radius:20px;color:#666;flex-shrink:0;margin-top:4px;}
.ulbl{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-weight:500;}
.chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:.85rem;}
.chip{font-size:12px;padding:3px 10px;background:#f0efe8;border:1px solid #e0dfd8;border-radius:20px;color:#777;}
.chip.x{text-decoration:line-through;opacity:.65;}
.arrow-tip{font-size:12px;color:#bbb;align-self:center;}
.defn{font-size:15px;color:#1a1a18;line-height:1.65;margin-bottom:.85rem;}
.ex{font-size:13px;color:#666;line-height:1.6;padding:9px 12px;background:#f8f7f3;border-radius:8px;border-left:2.5px solid #d0cfc8;margin-bottom:7px;font-style:italic;}
.tip-box{font-size:12px;color:#1a56a0;padding:9px 12px;background:#e8f0fb;border-radius:8px;border:1px solid #b8d0f0;margin-bottom:1.1rem;line-height:1.5;}
.tip-box .ti{margin-right:5px;vertical-align:-2px;}
.btn{display:block;width:100%;padding:11px;background:none;border:1px solid #ccc;border-radius:10px;font-size:13px;font-weight:600;color:#1a1a18;cursor:pointer;transition:background .15s;font-family:inherit;}
.btn:hover:not([disabled]):not(.done){background:#f0efe8;}
.btn.done{background:#e6f5d0;border-color:#8abf4a;color:#3a6b0e;cursor:default;}
.btn.sm{font-size:12px;padding:8px;}
.btn.prim{background:#1a1a18;color:#fff;border-color:#1a1a18;}
.btn.prim:hover:not([disabled]){background:#333;border-color:#333;}
.btn:disabled{opacity:.5;cursor:default;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;}
.slbl{font-size:11px;font-weight:600;color:#888;margin:1.4rem 0 .75rem;text-transform:uppercase;letter-spacing:.6px;}
.done-banner{background:#e6f5d0;border:1px solid #8abf4a;border-radius:14px;padding:1.4rem;text-align:center;margin-bottom:1rem;}
.done-banner .ti{font-size:28px;color:#3a6b0e;display:block;margin-bottom:.5rem;}
.done-title{font-size:15px;font-weight:600;color:#3a6b0e;}
.done-sub{font-size:12px;color:#3a6b0e;opacity:.8;margin-top:4px;}
.rbar{background:#f0efe8;border:1px solid #e0dfd8;border-radius:12px;padding:.85rem 1rem;margin-bottom:1rem;}
.rbar-top{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.rmeta{font-size:12px;color:#666;line-height:1.5;}
.rmeta strong{color:#1a1a18;font-weight:600;display:block;margin-bottom:1px;}
.rbtn-ai{display:flex;align-items:center;gap:6px;padding:8px 16px;background:#fff;border:1px solid #ccc;border-radius:8px;font-size:12px;font-weight:600;color:#1a1a18;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s;font-family:inherit;}
.rbtn-ai:hover:not([disabled]){background:#f8f7f3;}
.rbtn-ai:disabled{opacity:.5;cursor:default;}
.key-box{margin-top:.85rem;padding:.85rem;background:#fff;border:1px solid #e0dfd8;border-radius:10px;}
.key-box p{font-size:12px;color:#666;margin-bottom:.5rem;}
.key-box a{color:#1a56a0;}
.key-row{display:flex;gap:8px;}
.key-inp{flex:1;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:13px;font-family:monospace;color:#1a1a18;background:#fff;}
.key-inp:focus{outline:none;border-color:#888;}
.key-save{padding:8px 14px;background:#1a1a18;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.key-clear{padding:8px 10px;background:none;border:1px solid #e0dfd8;border-radius:8px;font-size:12px;cursor:pointer;color:#888;font-family:inherit;}
.key-note{font-size:11px;color:#aaa;margin-top:.4rem;}
.syn-box{margin-top:1.25rem;padding:1rem;background:#f0efe8;border-radius:12px;}
.qcenter{text-align:center;padding:2.5rem 1rem;}
.qicon{font-size:44px;color:#888;margin-bottom:1rem;}
.pbar{height:4px;background:#e0dfd8;border-radius:4px;margin-bottom:1.4rem;overflow:hidden;}
.pfill{height:100%;background:#1a1a18;border-radius:4px;transition:width .3s;}
.qq{background:#fff;border:1px solid #e0dfd8;border-radius:14px;padding:1.4rem;margin-bottom:.85rem;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.qhint{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:.5rem;font-weight:500;}
.qprompt{font-size:19px;font-weight:600;color:#1a1a18;line-height:1.4;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.85rem;}
.opt{padding:13px;background:#fff;border:1px solid #ccc;border-radius:10px;font-size:13px;color:#1a1a18;cursor:pointer;text-align:left;line-height:1.4;transition:background .1s;font-family:inherit;}
.opt:hover:not([disabled]){background:#f0efe8;}
.opt.right{background:#e6f5d0!important;border-color:#8abf4a!important;color:#3a6b0e!important;font-weight:600;}
.opt.wrong{background:#fdeaea!important;border-color:#e89090!important;color:#8b2222!important;}
.opt[disabled]{cursor:default;}
.score-box{background:#f0efe8;border-radius:14px;padding:2.5rem;text-align:center;margin-bottom:1rem;}
.score-num{font-size:60px;font-weight:700;color:#1a1a18;line-height:1;}
.score-denom{font-size:30px;color:#888;}
.score-pct{font-size:24px;font-weight:600;margin:.3rem 0;}
.score-msg{font-size:14px;color:#666;margin-top:.3rem;}
.srch{width:100%;padding:10px 14px;border:1px solid #ccc;border-radius:10px;font-size:14px;margin-bottom:.85rem;background:#fff;color:#1a1a18;font-family:inherit;}
.srch:focus{outline:none;border-color:#888;}
.catf{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.85rem;}
.catb{font-size:12px;padding:5px 13px;background:none;border:1px solid #ccc;border-radius:20px;color:#666;cursor:pointer;transition:all .15s;font-family:inherit;}
.catb:hover{border-color:#888;}
.catb.on{background:#1a1a18;border-color:#1a1a18;color:#fff;}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;}
.wcard{background:#fff;border:1px solid #e0dfd8;border-radius:14px;padding:1.1rem;cursor:pointer;transition:border-color .15s;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.wcard:hover{border-color:#888;}
.wcard.open{grid-column:1/-1;cursor:default;}
.clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-bottom:1.4rem;}
.stat{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:1.1rem;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.stat-n{font-size:32px;font-weight:700;color:#1a1a18;}
.stat-l{font-size:11px;color:#888;margin-top:3px;}
.wkrow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:1.5rem;}
.dayc{height:44px;border-radius:10px;background:#f0efe8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:#aaa;}
.dayc.act{background:#e6f5d0;color:#3a6b0e;}
.dayc.tod{outline:2px solid #888;}
.qbox{background:#f0efe8;border-radius:14px;padding:1.4rem;font-size:14px;color:#666;line-height:1.8;font-style:italic;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1rem;text-align:center;gap:.85rem;}
.spinner{width:28px;height:28px;border:2.5px solid #e0dfd8;border-top-color:#1a1a18;border-radius:50%;animation:spin .7s linear infinite;}
.spinner-sm{width:14px;height:14px;border:1.5px solid #ccc;border-top-color:#1a1a18;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:13px;padding:10px 20px;border-radius:10px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2);}
.toast.show{opacity:1;}
@media(max-width:500px){.two,.wgrid,.opts{grid-template-columns:1fr;}.wcard.open{grid-column:auto;}.wname{font-size:24px;}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="wrap">
  <div class="hdr">
    <div><div class="app-name">Recall</div><div class="app-date" id="hdr-date"></div></div>
    <div class="streak-pill"><i class="ti ti-flame flame"></i><span id="streak-n">0</span><span class="streak-sub">day streak</span></div>
  </div>
  <nav class="nav" role="tablist">
    <button class="nb on" id="tb-today" onclick="go('today')" role="tab">Today</button>
    <button class="nb" id="tb-quiz" onclick="go('quiz')" role="tab">Practice</button>
    <button class="nb" id="tb-explore" onclick="go('explore')" role="tab">Words</button>
    <button class="nb" id="tb-progress" onclick="go('progress')" role="tab">Progress</button>
  </nav>
  <div id="content"></div>
</div>
<script>
let W=[
{id:'stellar',w:'Stellar',ph:'STEL-er',pos:'adjective',cat:'general',alt:['very good','great','awesome'],def:'Exceptionally good; outstanding in performance or quality.',ex:['Your presentation was stellar \u2014 the room was completely engaged.','She did stellar work coordinating the launch under a tight deadline.'],tip:'Use in meetings or emails when praising someone\'s contribution. Carries far more weight than "great job."',syn:['exceptional','remarkable','superb']},
{id:'articulate',w:'Articulate',ph:'ar-TIK-yoo-let',pos:'adjective',cat:'general',alt:['good at explaining','speaks clearly','easy to follow'],def:'Able to express thoughts and ideas clearly, fluently, and with precision.',ex:['She gave an articulate explanation of the policy changes.','He is one of the most articulate communicators I\'ve encountered in any boardroom.'],tip:'Use this to compliment how someone communicates \u2014 in a recommendation or after a strong presentation.',syn:['eloquent','fluent','expressive']},
{id:'candid',w:'Candid',ph:'KAN-did',pos:'adjective',cat:'general',alt:['honest','direct','upfront'],def:'Truthful and straightforward, even when the truth is uncomfortable.',ex:['I\'ll be candid \u2014 I think the timeline is too aggressive.','She appreciated his candid feedback far more than vague reassurances.'],tip:'Use when you\'re about to say something honest but sensitive. It signals respect.',syn:['frank','forthright','transparent']},
{id:'nuanced',w:'Nuanced',ph:'NOO-anst',pos:'adjective',cat:'general',alt:['complicated','layered','more to it'],def:'Marked by subtle distinctions; not reducible to a simple yes or no.',ex:['The situation is more nuanced than the email chain suggests.','Her nuanced understanding of the client\'s needs made her indispensable.'],tip:'Use when oversimplifying would be misleading. It signals depth of analysis.',syn:['subtle','layered','refined']},
{id:'pivotal',w:'Pivotal',ph:'PIV-uh-tul',pos:'adjective',cat:'general',alt:['very important','key','make or break'],def:'Of crucial importance to the development or success of something.',ex:['This decision is pivotal \u2014 what we choose here shapes the next two years.','Her role was pivotal during the company\'s restructuring.'],tip:'Reserve this for genuine turning points. It loses power if used for everything.',syn:['critical','decisive','crucial']},
{id:'succinct',w:'Succinct',ph:'suk-SINGKT',pos:'adjective',cat:'general',alt:['brief','short and clear','to the point'],def:'Briefly and clearly expressed; saying a great deal in very few words.',ex:['Keep the executive summary succinct \u2014 three sentences, no more.','Her succinct reply cut through three hours of back-and-forth.'],tip:'Use to compliment writing where someone packs a lot into very little.',syn:['concise','terse','pithy']},
{id:'lucid',w:'Lucid',ph:'LOO-sid',pos:'adjective',cat:'general',alt:['clear','easy to follow','makes sense'],def:'Expressed with complete clarity; easy to understand even when complex.',ex:['His lucid breakdown of the architecture impressed the executive team.','After some rest, her thinking became far more lucid.'],tip:'Use to describe explanations or thinking that cuts through confusion.',syn:['clear','coherent','transparent']},
{id:'ponder',w:'Ponder',ph:'PON-der',pos:'verb',cat:'general',alt:['think about','mull over','sit with it'],def:'To think deeply and carefully about something before forming a view.',ex:['I\'ve been pondering your proposal \u2014 can we discuss Thursday?','She paused to ponder the implications before responding.'],tip:'Use when you want to signal deliberate, unhurried thinking.',syn:['contemplate','deliberate','reflect']},
{id:'leverage',w:'Leverage',ph:'LEV-er-ij',pos:'verb',cat:'workplace',alt:['use','take advantage of','make use of'],def:'To use something to maximum strategic advantage.',ex:['We can leverage the existing partnership to accelerate the timeline.','She leveraged her network to get the introductions the team needed.'],tip:'Signals strategic intent \u2014 using a resource smartly, not just passively.',syn:['utilize','harness','mobilize']},
{id:'synthesize',w:'Synthesize',ph:'SIN-thuh-size',pos:'verb',cat:'workplace',alt:['combine','bring together','pull together'],def:'To combine information from multiple sources into a unified, coherent picture.',ex:['Can you synthesize the feedback from all three teams before Thursday?','She synthesized months of research into a clear two-page brief.'],tip:'Use when creating something new and coherent from multiple inputs.',syn:['consolidate','integrate','distill']},
{id:'calibrate',w:'Calibrate',ph:'KAL-uh-brayt',pos:'verb',cat:'workplace',alt:['adjust','fine-tune','get right'],def:'To carefully adjust or align something based on precise feedback.',ex:['Let\'s calibrate our expectations before the stakeholder presentation.','We need to calibrate the messaging based on the audience\'s background.'],tip:'Use when precise, feedback-driven adjustment is involved.',syn:['adjust','align','refine']},
{id:'advocate',w:'Advocate',ph:'AD-vuh-kayt',pos:'verb',cat:'workplace',alt:['support','push for','stand up for'],def:'To publicly and actively recommend or support a cause, policy, or person.',ex:['She advocated strongly for more flexible working arrangements.','I\'ll advocate for your proposal in the leadership meeting.'],tip:'Implies active, committed support \u2014 stronger than simply agreeing.',syn:['champion','promote','endorse']},
{id:'facilitate',w:'Facilitate',ph:'fuh-SIL-uh-tayt',pos:'verb',cat:'workplace',alt:['run','help with','manage'],def:'To make a process or group discussion easier by actively guiding it forward.',ex:['She was asked to facilitate the cross-functional strategy session.','His role is to facilitate alignment, not to dictate the direction.'],tip:'Use when enabling others to move forward \u2014 clearing the path, not doing the work.',syn:['enable','coordinate','guide']},
{id:'iterate',w:'Iterate',ph:'IT-er-ayt',pos:'verb',cat:'workplace',alt:['refine it','go back and adjust','tweak'],def:'To repeat and improve a process with each cycle.',ex:['Let\'s iterate on the design based on last week\'s feedback.','The best teams iterate quickly rather than waiting for perfection.'],tip:'Implies continuous improvement rather than one-time fixes.',syn:['refine','revisit','evolve']},
{id:'pragmatic',w:'Pragmatic',ph:'prag-MAT-ik',pos:'adjective',cat:'workplace',alt:['practical','realistic','sensible'],def:'Dealing with things based on what\'s actually achievable, not just what\'s ideal.',ex:['We need a pragmatic approach \u2014 idealism won\'t get this across the line.','She\'s known for making pragmatic decisions under uncertain conditions.'],tip:'Use when emphasizing realistic problem-solving over theoretical ideals.',syn:['practical','realistic','sensible']},
{id:'delegate',w:'Delegate',ph:'DEL-uh-gayt',pos:'verb',cat:'workplace',alt:['hand it off','assign','pass along'],def:'To entrust a task or responsibility to someone, along with the authority to carry it out.',ex:['Great leaders know when to delegate and when to stay hands-on.','She delegated the research phase while focusing on the pitch itself.'],tip:'Use when the handoff involves genuine trust and authority.',syn:['assign','entrust','empower']},
{id:'empathize',w:'Empathize',ph:'EM-puh-thize',pos:'verb',cat:'personal',alt:['understand how they feel','relate to','feel for'],def:'To understand and genuinely share in the feelings of another person.',ex:['I can empathize with how overwhelming this transition must feel.','A good manager empathizes with their team without losing sight of the goal.'],tip:'Use when you want to signal deep emotional understanding.',syn:['relate','connect with','understand']},
{id:'resilient',w:'Resilient',ph:'ri-ZIL-yunt',pos:'adjective',cat:'personal',alt:['strong','bouncing back','keeps going'],def:'Able to recover quickly from setbacks and adapt positively to difficulty.',ex:['She has been remarkably resilient through this past year of changes.','Building a resilient team means preparing for the unexpected.'],tip:'A powerful word for describing someone who has handled adversity with grace.',syn:['adaptable','tenacious','steadfast']},
{id:'genuine',w:'Genuine',ph:'JEN-yoo-in',pos:'adjective',cat:'personal',alt:['real','sincere','from the heart'],def:'Truly what it appears to be \u2014 authentic, not performed or rehearsed.',ex:['Her concern for the team was genuine \u2014 they could all feel it.','A genuine apology changes the dynamic completely.'],tip:'Use when sincerity is the point \u2014 as opposed to performative behavior.',syn:['sincere','authentic','heartfelt']},
{id:'deliberate',w:'Deliberate',ph:'dih-LIB-er-it',pos:'adjective',cat:'personal',alt:['on purpose','thought out','intentional'],def:'Done with full consciousness and intent; the opposite of accidental.',ex:['She made a deliberate choice to step back and reassess first.','The design was deliberate \u2014 every element served a purpose.'],tip:'Use when you want to emphasize something was carefully considered.',syn:['intentional','purposeful','considered']},
{id:'cherish',w:'Cherish',ph:'CHER-ish',pos:'verb',cat:'personal',alt:['love','value deeply','hold onto'],def:'To hold something or someone dear; to protect and nurture with profound care.',ex:['I cherish the time we get together on weekends.','These early years with your kids \u2014 cherish every moment.'],tip:'Stronger and warmer than "love" \u2014 use in heartfelt moments with family.',syn:['treasure','hold dear','appreciate']},
{id:'robust',w:'Robust',ph:'roh-BUST',pos:'adjective',cat:'tech',alt:['strong','reliable','doesn\'t break'],def:'Strong and effective under all conditions; able to withstand stress.',ex:['We need a more robust backup process before we scale.','The system performed robustly even under peak load.'],tip:'Use in technical discussions about systems that need to hold up under pressure.',syn:['solid','reliable','dependable']},
{id:'scalable',w:'Scalable',ph:'SKAY-luh-bul',pos:'adjective',cat:'tech',alt:['can grow','will work at scale','flexible'],def:'Able to expand in capacity to handle increased demand without breaking.',ex:['Is this a scalable solution, or are we building into a corner?','The infrastructure is scalable \u2014 we can add capacity within hours.'],tip:'Use when evaluating whether a solution will hold up as needs grow.',syn:['expandable','adaptable','extensible']},
{id:'streamline',w:'Streamline',ph:'STREAM-line',pos:'verb',cat:'tech',alt:['simplify','cut steps','make easier'],def:'To make a system more efficient by removing unnecessary steps.',ex:['Let\'s streamline the approval process \u2014 four sign-offs is too many.','The tool streamlined onboarding from two weeks to three days.'],tip:'Use when reducing complexity by design, not just trimming arbitrarily.',syn:['simplify','optimize','smooth out']},
{id:'intuitive',w:'Intuitive',ph:'in-TOO-ih-tiv',pos:'adjective',cat:'tech',alt:['easy to use','natural','just clicks'],def:'Easy to understand without needing explicit instruction; naturally self-evident.',ex:['The new interface is far more intuitive \u2014 training time dropped by half.','Her intuitive grasp of the problem impressed the engineering team.'],tip:'Use to describe interfaces or thinking that feels naturally right.',syn:['natural','instinctive','self-evident']},
{id:'holistic',w:'Holistic',ph:'hoh-LIS-tik',pos:'adjective',cat:'health',alt:['overall','the whole picture','considering everything'],def:'Treating something as a unified whole rather than isolated parts.',ex:['Her doctor took a holistic approach \u2014 looking at sleep, stress, and diet.','A holistic review includes culture and morale, not just numbers.'],tip:'Use when you\'re considering the full picture, not just isolated data points.',syn:['comprehensive','integrated','whole-person']},
{id:'proactive',w:'Proactive',ph:'proh-AK-tiv',pos:'adjective',cat:'health',alt:['ahead of time','preventive','not waiting'],def:'Taking action to prevent problems before they occur, rather than reacting afterward.',ex:['Being proactive about mental health means not waiting until crisis.','She was proactive in scheduling check-ins before tensions escalated.'],tip:'Use when emphasizing prevention and initiative over reaction.',syn:['preventive','forward-thinking','anticipatory']},
{id:'mitigate',w:'Mitigate',ph:'MIT-ih-gayt',pos:'verb',cat:'health',alt:['reduce','lessen','make less bad'],def:'To lessen the severity or impact of something.',ex:['Regular movement can mitigate the effects of prolonged screen time.','We took steps to mitigate the risks before the rollout.'],tip:'Use when taking steps to reduce impact \u2014 implies intentional intervention.',syn:['reduce','alleviate','minimize']},
{id:'discerning',w:'Discerning',ph:'dis-SERN-ing',pos:'adjective',cat:'lifestyle',alt:['picky','selective','has good taste'],def:'Showing good judgment; selective in a way that reflects high standards.',ex:['She\'s a discerning reader \u2014 she won\'t finish a book just because she started.','The restaurant attracts a discerning clientele who value quality.'],tip:'A sophisticated way to describe selectiveness \u2014 frame it as a compliment.',syn:['selective','perceptive','tasteful']},
{id:'curate',w:'Curate',ph:'KYOO-rayt',pos:'verb',cat:'lifestyle',alt:['choose carefully','pick','put together'],def:'To carefully select and organize with knowledge and expert judgment.',ex:['She curates her reading list the way a museum curator selects pieces.','I\'ve been curating a morning routine that actually works.'],tip:'Use when the selection is thoughtful and purposeful \u2014 not just picking.',syn:['handpick','select','assemble']},
{id:'savor',w:'Savor',ph:'SAY-ver',pos:'verb',cat:'lifestyle',alt:['enjoy slowly','appreciate','not rush through'],def:'To enjoy something fully and unhurriedly, especially when fleeting.',ex:['Savor these early years with your kids \u2014 they move faster than you expect.','He savored the quiet Sunday morning before the week began.'],tip:'Use when encouraging presence and slow enjoyment. Beautiful in family contexts.',syn:['relish','treasure','appreciate']}
];
const CATS=[{id:'all',l:'All'},{id:'general',l:'General'},{id:'workplace',l:'Workplace'},{id:'personal',l:'Personal'},{id:'tech',l:'Tech'},{id:'health',l:'Health'},{id:'lifestyle',l:'Lifestyle'}];
const QUOTES=['\u201cThe limits of my language are the limits of my world.\u201d \u2014 Wittgenstein','\u201cLanguage is the road map of a culture.\u201d \u2014 Rita Mae Brown','Every word you recall is a neural pathway strengthened.','Small daily practice compounds into remarkable fluency.','\u201cYou are never too old to set another goal.\u201d \u2014 C.S. Lewis','Words are the currency of thought. The richer your vocabulary, the richer your thinking.'];
const st={tab:'today',streak:0,lastCompleted:'',reviewedToday:new Set(),reviewHistory:[],qPhase:'start',qQs:[],qIdx:0,qScore:0,qAnswered:false,qSelected:-1,eCat:'all',eSearch:'',eOpen:null,refreshing:false,showKey:false};
function todayStr(){return new Date().toISOString().slice(0,10);}
function yest(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function seededShuffle(arr,seed){const r=[...arr];let s=seed;for(let i=r.length-1;i>0;i--){s=(s*16807)%2147483647;const j=s%(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}
function dailyWords(){return seededShuffle(W,Math.floor(Date.now()/86400000)).slice(0,3);}
function h(s){if(typeof s!=='string')s=String(s||'');return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function getKey(){return localStorage.getItem('recall-apikey')||'';}
function setKey(k){localStorage.setItem('recall-apikey',k);}
function clearKey(){localStorage.removeItem('recall-apikey');}
function loadSt(){
  try{const raw=localStorage.getItem('recall-gh-v1');if(raw){const s=JSON.parse(raw);if(Array.isArray(s.words)&&s.words.length>0)W=s.words;const today=todayStr();if(s.lastCompleted===today){st.streak=s.streak||0;st.reviewedToday=new Set(s.reviewedToday||[]);}else if(s.lastCompleted===yest()){st.streak=s.streak||0;}else{st.streak=0;}st.lastCompleted=s.lastCompleted||'';st.reviewHistory=s.reviewHistory||[];}}catch(e){}
}
function saveSt(){try{localStorage.setItem('recall-gh-v1',JSON.stringify({words:W,streak:st.streak,lastCompleted:st.lastCompleted,reviewedToday:[...st.reviewedToday],reviewHistory:st.reviewHistory}));}catch(e){}}
function updateHdr(){document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});document.getElementById('streak-n').textContent=st.streak;}
async function doRefresh(){
  if(st.refreshing)return;
  const apiKey=getKey();
  if(!apiKey){st.showKey=true;renderContent();return;}
  st.refreshing=true;renderContent();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:'Generate exactly 30 sophisticated vocabulary words for educated professionals aged 40+ who want to recall sharper words. Return ONLY a valid JSON array, no markdown. Each object: id (lowercase no spaces), w (capitalized), ph (phonetic), pos (adjective/verb/noun), cat (general/workplace/personal/tech/health/lifestyle), alt (2-3 plain phrases it replaces), def (one sentence), ex (array of 2 sentences), tip (one usage tip), syn (3 synonyms). Spread evenly across categories. Do NOT repeat: stellar,articulate,candid,nuanced,pivotal,succinct,lucid,ponder,leverage,synthesize,calibrate,advocate,facilitate,iterate,pragmatic,delegate,empathize,resilient,genuine,deliberate,cherish,robust,scalable,streamline,intuitive,holistic,proactive,mitigate,discerning,curate,savor.'}]})});
    const data=await res.json();
    if(data.error){toast('API error: '+data.error.message);st.refreshing=false;renderContent();return;}
    const parsed=JSON.parse(data.content[0].text.trim().replace(/```json|```/g,'').trim());
    if(Array.isArray(parsed)&&parsed.length>=10){W=parsed;st.reviewedToday=new Set();st.eOpen=null;saveSt();toast(parsed.length+' new words loaded!');}
    else toast('Refresh failed \u2014 keeping current words');
  }catch(e){toast('Error: '+(e.message||'refresh failed'));}
  st.refreshing=false;renderContent();
}
function applyKey(){const v=(document.getElementById('key-inp').value||'').trim();if(v.startsWith('sk-ant-')){setKey(v);st.showKey=false;toast('API key saved');renderContent();}else toast('Key should start with sk-ant-...');}
function rbar(){
  const hk=!!getKey();
  const ks=(st.showKey)?`<div class="key-box"><p>Paste your <a href="https://console.anthropic.com/settings/keys" target="_blank">Anthropic API key</a> to enable AI refresh:</p><div class="key-row"><input id="key-inp" class="key-inp" type="password" placeholder="sk-ant-..." value="${h(getKey())}"/><button class="key-save" onclick="applyKey()">Save</button>${hk?'<button class="key-clear" onclick="clearKey();st.showKey=false;renderContent();">Clear</button>':''}</div><p class="key-note">Stored in your browser only. Never shared.</p></div>`:'';
  return`<div class="rbar"><div class="rbar-top"><div class="rmeta"><strong>${W.length} words in your bank</strong>${hk?'API key ready \u00b7 tap to refresh':'Add API key to enable AI refresh'}</div><button class="rbtn-ai" onclick="doRefresh()" ${st.refreshing?'disabled':''}>${st.refreshing?'<div class="spinner-sm"></div>':'<i class="ti ti-sparkles"></i>'} ${st.refreshing?'Refreshing\u2026':'Refresh with AI'}</button></div>${ks}</div>`;
}
function bigCard(w){const done=st.reviewedToday.has(w.id);return`<div class="card featured${done?' dim':''}"><div class="wtop"><div><div class="wname">${h(w.w)}</div><div class="phonetic">${h(w.ph)}</div></div><span class="pos-badge">${h(w.pos)}</span></div><div class="ulbl">Say this instead of</div><div class="chips">${w.alt.map(a=>`<span class="chip x">${h(a)}</span>`).join('')}<span class="arrow-tip">\u2192 try <strong>${h(w.w)}</strong></span></div><div class="defn">${h(w.def)}</div>${w.ex.map(e=>`<div class="ex">\u201c${h(e)}\u201d</div>`).join('')}<div class="tip-box" style="margin-top:.85rem;"><i class="ti ti-bulb"></i> ${h(w.tip)}</div><button class="btn${done?' done':''}" onclick="mark('${w.id}')" ${done?'disabled':''}>${done?'<i class="ti ti-check"></i> Reviewed':'Mark as reviewed'}</button></div>`;}
function smallCard(w){const done=st.reviewedToday.has(w.id);return`<div class="card${done?' dim':''}"><div class="wtop" style="margin-bottom:.6rem;"><div class="wname sm">${h(w.w)}</div><span class="pos-badge">${h(w.pos)}</span></div><div style="font-size:13px;color:#555;line-height:1.55;margin-bottom:.75rem;">${h(w.def)}</div><div class="chips" style="margin-bottom:.85rem;">${w.alt.slice(0,2).map(a=>`<span class="chip x" style="font-size:11px;">${h(a)}</span>`).join('')}</div><button class="btn sm${done?' done':''}" onclick="mark('${w.id}')" ${done?'disabled':''}>${done?'<i class="ti ti-check"></i> Done':'Review'}</button></div>`;}
function renderToday(){
  if(st.refreshing)return rbar()+`<div class="loading"><div class="spinner"></div><div style="font-size:15px;font-weight:600;">Curating fresh words\u2026</div><div style="font-size:12px;color:#888;">About 10 seconds</div></div>`;
  const dw=dailyWords();const allDone=dw.every(w=>st.reviewedToday.has(w.id));
  let html=rbar();
  if(allDone)html+=`<div class="done-banner"><i class="ti ti-circle-check"></i><div class="done-title">Today\u2019s words reviewed</div><div class="done-sub">Come back tomorrow. You\u2019re building a great habit.</div></div>`;
  html+=bigCard(dw[0]);
  html+=`<div class="slbl">Also today</div><div class="two">${smallCard(dw[1])}${smallCard(dw[2])}</div>`;
  html+=`<div class="syn-box"><div class="slbl" style="margin-top:0;">Synonyms to know</div><div class="chips">${[...dw[0].syn,...dw[1].syn,...dw[2].syn].map(s=>`<span class="chip">${h(s)}</span>`).join('')}</div></div>`;
  return html;
}
function mark(id){if(st.reviewedToday.has(id))return;st.reviewedToday.add(id);const dw=dailyWords();if(dw.every(w=>st.reviewedToday.has(w.id))){const today=todayStr();if(st.lastCompleted!==today){st.streak=st.lastCompleted===yest()?st.streak+1:1;st.lastCompleted=today;st.reviewHistory=[...st.reviewHistory,{date:today,count:3}].slice(-30);}}updateHdr();saveSt();renderContent();}
function genQs(){return seededShuffle(W,Date.now()).slice(0,8).map((w,i)=>{const others=W.filter(x=>x.id!==w.id).sort(()=>Math.random()-.5);if(i%2===0){const c=w.def;const opts=[c,...others.slice(0,3).map(x=>x.def)].sort(()=>Math.random()-.5);return{prompt:w.w,hint:'What does this word mean?',opts,ci:opts.indexOf(c)};}const c=w.w;const opts=[c,...others.slice(0,3).map(x=>x.w)].sort(()=>Math.random()-.5);return{prompt:`Instead of saying \u201c${w.alt[0]}\u201d`,hint:'Which word is the stronger choice?',opts,ci:opts.indexOf(c)};});}
function renderQuiz(){
  if(st.qPhase==='start')return`<div class="qcenter"><div class="qicon"><i class="ti ti-brain"></i></div><div style="font-size:20px;font-weight:600;margin-bottom:.5rem;">Ready to practice?</div><div style="font-size:14px;color:#666;margin-bottom:1.75rem;line-height:1.6;">8 quick questions \u2014 match words to meanings or find the sharper alternative.</div><button class="btn prim" style="max-width:200px;" onclick="startQ()">Start practice</button></div>`;
  if(st.qPhase==='done'){const p=Math.round(st.qScore/st.qQs.length*100);const msg=p>=88?'Outstanding recall.':p>=65?'Solid effort \u2014 keep going.':'Good start \u2014 it gets easier.';return`<div class="score-box"><div class="score-num">${st.qScore}<span class="score-denom">/${st.qQs.length}</span></div><div class="score-pct">${p}%</div><div class="score-msg">${h(msg)}</div></div><button class="btn prim" style="margin-bottom:.85rem;" onclick="startQ()">Try again</button><button class="btn" onclick="go('today')">Back to today\u2019s words</button>`;}
  const q=st.qQs[st.qIdx];const p=Math.round(st.qIdx/st.qQs.length*100);
  return`<div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;"><span style="font-size:12px;color:#888;">${st.qIdx+1} of ${st.qQs.length}</span><span style="font-size:13px;font-weight:600;">Score: ${st.qScore}</span></div><div class="pbar"><div class="pfill" style="width:${p}%"></div></div><div class="qq"><div class="qhint">${h(q.hint)}</div><div class="qprompt">${h(q.prompt)}</div></div><div class="opts">${q.opts.map((o,i)=>{let c='opt';if(st.qAnswered){if(i===q.ci)c+=' right';else if(i===st.qSelected)c+=' wrong';}return`<button class="${c}" onclick="answerQ(${i})" ${st.qAnswered?'disabled':''}>${h(o)}</button>`;}).join('')}</div>${st.qAnswered?`<button class="btn" onclick="nextQ()">${st.qIdx<st.qQs.length-1?'Next question':'See results'}</button>`:''}</div>`;
}
function startQ(){st.qPhase='question';st.qQs=genQs();st.qIdx=0;st.qScore=0;st.qAnswered=false;st.qSelected=-1;renderContent();}
function answerQ(i){if(st.qAnswered)return;st.qAnswered=true;st.qSelected=i;if(i===st.qQs[st.qIdx].ci)st.qScore++;renderContent();}
function nextQ(){st.qIdx++;if(st.qIdx>=st.qQs.length)st.qPhase='done';st.qAnswered=false;st.qSelected=-1;renderContent();}
function renderExplore(){
  if(st.refreshing)return`<div class="loading"><div class="spinner"></div><div style="font-size:14px;color:#666;">Refreshing words\u2026</div></div>`;
  const fl=W.filter(w=>{const cok=st.eCat==='all'||w.cat===st.eCat;const q=st.eSearch.toLowerCase();const sok=!q||w.w.toLowerCase().includes(q)||w.def.toLowerCase().includes(q)||w.alt.some(a=>a.includes(q));return cok&&sok;});
  return`<div><input class="srch" type="text" placeholder="Search words, meanings, or phrases\u2026" value="${h(st.eSearch)}" oninput="eSrch(this.value)"/><div class="catf">${CATS.map(c=>`<button class="catb${st.eCat===c.id?' on':''}" onclick="eCat('${c.id}')">${c.l}</button>`).join('')}</div><div style="font-size:12px;color:#888;margin-bottom:.85rem;">${fl.length} word${fl.length!==1?'s':''}</div><div class="wgrid">${fl.map(w=>{if(st.eOpen===w.id)return`<div class="wcard open"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.85rem;"><div><div class="wname" style="font-size:22px;">${h(w.w)}</div><div class="phonetic">${h(w.ph)}</div></div><div style="display:flex;gap:8px;align-items:center;"><span class="pos-badge">${h(w.pos)}</span><button onclick="eOpen(null)" style="background:none;border:none;cursor:pointer;font-size:20px;color:#888;padding:0;line-height:1;"><i class="ti ti-x"></i></button></div></div><div class="ulbl">Instead of saying</div><div class="chips">${w.alt.map(a=>`<span class="chip x">${h(a)}</span>`).join('')}</div><div class="defn" style="margin-top:.75rem;">${h(w.def)}</div>${w.ex.map(e=>`<div class="ex">\u201c${h(e)}\u201d</div>`).join('')}<div class="tip-box" style="margin-top:.75rem;"><i class="ti ti-bulb"></i> ${h(w.tip)}</div></div>`;return`<div class="wcard" onclick="eOpen('${w.id}')"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;"><div class="wname" style="font-size:16px;">${h(w.w)}</div><span class="pos-badge" style="font-size:10px;">${h(w.pos)}</span></div><div class="clamp" style="font-size:12px;color:#666;line-height:1.5;margin-bottom:8px;">${h(w.def)}</div><div class="chips">${w.alt.slice(0,1).map(a=>`<span class="chip x" style="font-size:11px;">${h(a)}</span>`).join('')}</div></div>`;}).join('')}</div></div>`;
}
function eCat(c){st.eCat=c;st.eOpen=null;renderContent();}
function eSrch(q){st.eSearch=q;st.eOpen=null;renderContent();}
function eOpen(id){st.eOpen=id;renderContent();}
function renderProgress(){
  const tc=st.reviewedToday.size,wk=st.reviewHistory.slice(-7).reduce((a,r)=>a+(r.count||0),0)+tc,total=st.reviewHistory.reduce((a,r)=>a+(r.count||0),0)+tc;
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);days.push({l:d.toLocaleDateString('en-US',{weekday:'short'}).slice(0,1),isT:i===0,act:i===0?tc>0:st.reviewHistory.some(r=>r.date===ds)});}
  const smsg=st.streak===0?'Start today \u2014 your streak begins with the first word.':st.streak<7?`${st.streak} days in. You\u2019re forming the habit.`:st.streak<14?`${st.streak} days straight. Becoming part of who you are.`:`${st.streak} days. Remarkable.`;
  const qi=Math.floor(Date.now()/86400000)%QUOTES.length;
  return`<div><div class="sgrid"><div class="stat"><div class="stat-n">${st.streak}</div><div class="stat-l">Day streak</div></div><div class="stat"><div class="stat-n">${tc}</div><div class="stat-l">Today</div></div><div class="stat"><div class="stat-n">${wk}</div><div class="stat-l">This week</div></div></div><div style="background:#f0efe8;border-radius:12px;padding:1rem;margin-bottom:1.4rem;"><div style="font-size:13px;color:#555;">${h(smsg)}</div></div><div class="slbl">Last 7 days</div><div class="wkrow">${days.map(d=>`<div class="dayc${d.act?' act':''}${d.isT?' tod':''}"><span>${d.l}</span>${d.act?'<i class="ti ti-check" style="font-size:11px;"></i>':'<span style="opacity:.3;">\u00b7</span>'}</div>`).join('')}</div><div class="slbl">Word bank</div><div style="font-size:14px;color:#555;margin-bottom:1.5rem;">${W.length} words \u00b7 <strong>${total} reviewed total</strong></div><div class="qbox">${h(QUOTES[qi])}</div></div>`;
}
function go(tab){st.tab=tab;if(tab==='quiz')st.qPhase='start';document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));document.getElementById('tb-'+tab).classList.add('on');renderContent();}
function renderContent(){let html='';if(st.tab==='today')html=renderToday();else if(st.tab==='quiz')html=renderQuiz();else if(st.tab==='explore')html=renderExplore();else html=renderProgress();document.getElementById('content').innerHTML=html;}
loadSt();updateHdr();renderContent();
</script>
</body>
</html>
