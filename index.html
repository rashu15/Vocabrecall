function seededShuffle(arr,seed){
  const r=[...arr];let s=seed;
  for(let i=r.length-1;i>0;i--){s=(s*16807+0)%2147483647;const j=s%(i+1);[r[i],r[j]]=[r[j],r[i]];}

}

function dailyWords(){
  const dayN=Math.floor(Date.now()/86400000);
  return seededShuffle(W,dayN).slice(0,3);
}

async function loadSt(){
  try{
    const r=await window.storage.get('recall-v4');
    if(r){
      const s=JSON.parse(r.value);
      if(Array.isArray(s.words)&&s.words.length>0) W=s.words;
      const today=todayStr();
      if(s.lastCompleted===today){st.streak=s.streak||0;st.reviewedToday=new Set(s.reviewedToday||[]);}
      else if(s.lastCompleted===yest()){st.streak=s.streak||0;st.reviewedToday=new Set();}
      else{st.streak=0;st.reviewedToday=new Set();}
      st.lastCompleted=s.lastCompleted||'';
      st.reviewHistory=s.reviewHistory||[];
    }
  }catch(e){}
}

async function saveSt(){
  try{
    await window.storage.set('recall-v4',JSON.stringify({
      words:W,streak:st.streak,lastCompleted:st.lastCompleted,
      reviewedToday:[...st.reviewedToday],reviewHistory:st.reviewHistory
    }));
  }catch(e){}
}

function h(s){
  if(typeof s!=='string')s=String(s||'');
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function updateHdr(){
  const now=new Date();
  document.getElementById('hdr-date').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('streak-n').textContent=st.streak;
}

async function refreshWords(){
  if(st.refreshing)return;
  st.refreshing=true;
  renderContent();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        messages:[{role:'user',content:`Generate exactly 30 sophisticated vocabulary words for educated professionals aged 40+ experiencing word-finding difficulty. These are high-achievers who want to recall sharper words instead of defaulting to plain ones.

Return ONLY a valid JSON array with no explanation, markdown, or code fences.

Each object must have exactly these fields:
- id: lowercase unique string, no spaces or special characters
- w: the word (capitalized)
- ph: phonetic pronunciation e.g. "STEL-er"
- pos: part of speech — one of: adjective, verb, noun
- cat: one of: general, workplace, personal, tech, health, lifestyle
- alt: array of 2-3 plain everyday phrases this word replaces e.g. ["very good","great"]
- def: one clear concise sentence definition
- ex: array of exactly 2 realistic example sentences in professional or personal contexts
- tip: one specific usage tip — when and where to use this word
- syn: array of exactly 3 synonyms

Distribute evenly: ~5 per category. Make words varied, sophisticated but natural. Do NOT repeat any of these words: stellar, articulate, candid, nuanced, pivotal, succinct, lucid, ponder, leverage, synthesize, calibrate, advocate, facilitate, iterate, pragmatic, delegate, empathize, resilient, genuine, deliberate, cherish, robust, scalable, streamline, intuitive, holistic, proactive, mitigate, discerning, curate, savor.`}]
      })
    });
    const data=await res.json();
    const raw=data.content[0].text.trim().replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(raw);
    if(Array.isArray(parsed)&&parsed.length>=10){
      W=parsed;
      st.reviewedToday=new Set();
      st.eOpen=null;
      await saveSt();
      showToast(`${W.length} new words loaded`);
    } else {
      showToast('Refresh failed — keeping current words');
    }
  }catch(e){
    showToast('Refresh failed — keeping current words');
  }
  st.refreshing=false;
  renderContent();
}

function refreshBar(){
  return `<div class="refresh-bar">
    <div class="refresh-meta">
      <strong>${W.length} words in your bank</strong>
      Tap refresh to load a fresh AI-curated set
    </div>
    <button class="refresh-btn" onclick="refreshWords()" ${st.refreshing?'disabled':''} aria-label="Refresh word list with AI">
      <i class="ti ti-${st.refreshing?'loader':'sparkles'}" aria-hidden="true" style="${st.refreshing?'animation:spin .7s linear infinite;':''}"></i>
      ${st.refreshing?'Refreshing…':'Refresh with AI'}
    </button>
  </div>`;
}

function bigCard(w){
  const done=st.reviewedToday.has(w.id);
  return `<div class="card featured${done?' dim':''}">
    <div class="wtop">
      <div><div class="wname">${h(w.w)}</div><div class="phonetic">${h(w.ph)}</div></div>
      <span class="pos">${h(w.pos)}</span>
    </div>
    <div class="upgrade-row">
      <div class="upgrade-lbl">Say this instead of</div>
      <div class="chips">
        ${w.alt.map(a=>`<span class="chip strike">${h(a)}</span>`).join('')}
        <span style="font-size:12px;color:var(--color-text-tertiary);align-self:center;">→ try <strong>${h(w.w)}</strong></span>
      </div>
    </div>
    <div class="defn">${h(w.def)}</div>
    <div class="exs">${w.ex.map(e=>`<div class="ex">"${h(e)}"</div>`).join('')}</div>
    <div class="tip"><i class="ti ti-bulb" aria-hidden="true"></i> ${h(w.tip)}</div>
    <button class="rbtn${done?' done':''}" onclick="markReviewed('${h(w.id)}')" ${done?'disabled':''}>
      ${done?'<i class="ti ti-check" aria-hidden="true"></i> Reviewed':'Mark as reviewed'}
    </button>
  </div>`;
}

function smallCard(w){
  const done=st.reviewedToday.has(w.id);
  return `<div class="card${done?' dim':''}">
    <div class="wtop" style="margin-bottom:.5rem;">
      <div class="wname sm">${h(w.w)}</div>
      <span class="pos">${h(w.pos)}</span>
    </div>
    <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:8px;">${h(w.def)}</div>
    <div class="chips" style="margin-bottom:10px;">${w.alt.slice(0,2).map(a=>`<span class="chip strike" style="font-size:11px;">${h(a)}</span>`).join('')}</div>
    <button class="rbtn sm${done?' done':''}" onclick="markReviewed('${h(w.id)}')" ${done?'disabled':''}>
      ${done?'<i class="ti ti-check" aria-hidden="true"></i> Done':'Review'}
    </button>
  </div>`;
}

function renderToday(){
  if(st.refreshing){
    return `${refreshBar()}<div class="loading-screen">
      <div class="spinner"></div>
      <div style="font-size:15px;font-weight:500;color:var(--color-text-primary);">Curating a fresh word list…</div>
      <div style="font-size:12px;color:var(--color-text-tertiary);">This takes about 10 seconds</div>
    </div>`;
  }
  const dw=dailyWords();
  const allDone=dw.every(w=>st.reviewedToday.has(w.id));
  let html=refreshBar();
  if(allDone){
    html+=`<div class="done-banner">
      <div class="done-icon"><i class="ti ti-circle-check" aria-hidden="true"></i></div>
      <div class="done-title">Today's words reviewed</div>
      <div class="done-sub">Come back tomorrow for 3 new ones. You're building a great habit.</div>
    </div>`;
  }
  html+=bigCard(dw[0]);
  html+=`<div class="slbl">Also today</div><div class="two">${smallCard(dw[1])}${smallCard(dw[2])}</div>`;
  html+=`<div style="margin-top:1.25rem;padding:1rem;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);">
    <div style="font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem;">Synonyms to know</div>
    <div class="chips">${[...dw[0].syn,...dw[1].syn,...dw[2].syn].map(s=>`<span class="chip">${h(s)}</span>`).join('')}</div>
  </div>`;
  return html;
}

async function markReviewed(id){
  if(st.reviewedToday.has(id))return;
  st.reviewedToday.add(id);
  const dw=dailyWords();
  if(dw.every(w=>st.reviewedToday.has(w.id))){
    const today=todayStr();
    if(st.lastCompleted!==today){
      st.streak=st.lastCompleted===yest()?st.streak+1:1;
      st.lastCompleted=today;
      st.reviewHistory=[...st.reviewHistory,{date:today,count:3}].slice(-30);
    }
  }
  updateHdr();await saveSt();renderContent();
}

function genQs(){
  const sh=seededShuffle(W,Date.now()).slice(0,8);
  return sh.map((w,i)=>{
    const mode=i%2===0?'def':'upgrade';
    const others=W.filter(x=>x.id!==w.id).sort(()=>Math.random()-.5);
    let prompt,hint,opts,ci;
    if(mode==='def'){
      prompt=w.w;hint='What does this word mean?';
      const correct=w.def;
      opts=[correct,...others.slice(0,3).map(x=>x.def)].sort(()=>Math.random()-.5);
      ci=opts.indexOf(correct);
    }else{
      prompt=`Instead of saying "${w.alt[0]}"`;hint='Which word is the stronger choice?';
      const correct=w.w;
      opts=[correct,...others.slice(0,3).map(x=>x.w)].sort(()=>Math.random()-.5);
      ci=opts.indexOf(correct);
    }
    return{prompt,hint,opts,ci};
  });
}

function renderQuiz(){
  if(st.qPhase==='start'){
    return `<div class="qcenter">
      <div class="qicon"><i class="ti ti-brain" aria-hidden="true"></i></div>
      <div style="font-size:18px;font-weight:500;margin-bottom:.5rem;">Ready to practice?</div>
      <div style="font-size:14px;color:var(--color-text-secondary);margin-bottom:1.5rem;line-height:1.6;">8 quick questions — match words to meanings or find the sharper word for a common phrase.</div>
      <button class="rbtn prim" style="max-width:200px;margin:0 auto;" onclick="startQ()">Start practice</button>
    </div>`;
  }
  if(st.qPhase==='done'){
    const pct=Math.round((st.qScore/st.qQs.length)*100);
    const msg=pct>=88?'Outstanding recall.':pct>=65?'Solid effort — keep going.':'Good start — it gets easier.';
    return `<div class="score-box">
      <div class="score-num">${st.qScore}<span style="font-size:28px;color:var(--color-text-secondary);">/${st.qQs.length}</span></div>
      <div style="font-size:22px;font-weight:500;margin:.25rem 0;">${pct}%</div>
      <div class="score-msg">${h(msg)}</div>
    </div>
    <button class="rbtn prim" style="margin-bottom:.75rem;" onclick="startQ()">Try again</button>
    <button class="rbtn" onclick="go('today')">Back to today's words</button>`;
  }
  const q=st.qQs[st.qIdx];
  const pct=Math.round((st.qIdx/st.qQs.length)*100);
  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;">
      <span style="font-size:12px;color:var(--color-text-secondary);">${st.qIdx+1} of ${st.qQs.length}</span>
      <span style="font-size:13px;font-weight:500;">Score: ${st.qScore}</span>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div class="qq"><div class="qhint">${h(q.hint)}</div><div class="qprompt">${h(q.prompt)}</div></div>
    <div class="opts">
      ${q.opts.map((o,i)=>{
        let cls='opt';
        if(st.qAnswered){if(i===q.ci)cls+=' right';else if(i===st.qSelected)cls+=' wrong';}
        return `<button class="${cls}" onclick="answerQ(${i})" ${st.qAnswered?'disabled':''}>${h(o)}</button>`;
      }).join('')}
    </div>
    ${st.qAnswered?`<button class="rbtn" onclick="nextQ()">${st.qIdx<st.qQs.length-1?'Next question':'See results'}</button>`:''}
  </div>`;
}

function startQ(){st.qPhase='question';st.qQs=genQs();st.qIdx=0;st.qScore=0;st.qAnswered=false;st.qSelected=-1;renderContent();}
function answerQ(i){if(st.qAnswered)return;st.qAnswered=true;st.qSelected=i;if(i===st.qQs[st.qIdx].ci)st.qScore++;renderContent();}
function nextQ(){st.qIdx++;if(st.qIdx>=st.qQs.length)st.qPhase='done';st.qAnswered=false;st.qSelected=-1;renderContent();}

function renderExplore(){
  if(st.refreshing)return`<div class="loading-screen"><div class="spinner"></div><div style="font-size:14px;color:var(--color-text-secondary);">Refreshing words…</div></div>`;
  const fl=W.filter(w=>{
    const cok=st.eCat==='all'||w.cat===st.eCat;
    const q=st.eSearch.toLowerCase();
    const sok=!q||w.w.toLowerCase().includes(q)||w.def.toLowerCase().includes(q)||w.alt.some(a=>a.includes(q));
    return cok&&sok;
  });
  return `<div>
    <input class="srch" type="text" placeholder="Search words, meanings, or phrases…" value="${h(st.eSearch)}" oninput="eSrch(this.value)"/>
    <div class="catf">${CATS.map(c=>`<button class="catb${st.eCat===c.id?' on':''}" onclick="eCat('${c.id}')">${c.l}</button>`).join('')}</div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:.75rem;">${fl.length} word${fl.length!==1?'s':''}</div>
    <div class="wgrid">
      ${fl.map(w=>{
        if(st.eOpen===w.id){
          return `<div class="excard open">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem;">
              <div><div class="wname" style="font-size:20px;">${h(w.w)}</div><div class="phonetic">${h(w.ph)}</div></div>
              <div style="display:flex;gap:8px;align-items:center;">
                <span class="pos">${h(w.pos)}</span>
                <button onclick="eOpen(null)" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--color-text-secondary);padding:0;" aria-label="Close"><i class="ti ti-x"></i></button>
              </div>
            </div>
            <div class="upgrade-row"><div class="upgrade-lbl">Instead of saying</div><div class="chips">${w.alt.map(a=>`<span class="chip strike">${h(a)}</span>`).join('')}</div></div>
            <div class="defn">${h(w.def)}</div>
            <div class="exs">${w.ex.map(e=>`<div class="ex">"${h(e)}"</div>`).join('')}</div>
            <div class="tip"><i class="ti ti-bulb" aria-hidden="true"></i> ${h(w.tip)}</div>
          </div>`;
        }
        return `<div class="excard" onclick="eOpen('${w.id}')">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px;">
            <div class="wname" style="font-size:15px;">${h(w.w)}</div>
            <span class="pos" style="font-size:10px;">${h(w.pos)}</span>
          </div>
          <div class="clamp" style="font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:7px;">${h(w.def)}</div>
          <div class="chips">${w.alt.slice(0,1).map(a=>`<span class="chip strike" style="font-size:11px;">${h(a)}</span>`).join('')}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function eCat(c){st.eCat=c;st.eOpen=null;renderContent();}
function eSrch(q){st.eSearch=q;st.eOpen=null;renderContent();}
function eOpen(id){st.eOpen=id;renderContent();}

function renderProgress(){
  const todayCount=st.reviewedToday.size;
  const weekCount=st.reviewHistory.slice(-7).reduce((a,r)=>a+(r.count||0),0)+todayCount;
  const totalAll=st.reviewHistory.reduce((a,r)=>a+(r.count||0),0)+todayCount;
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const isT=i===0;
    const act=isT?todayCount>0:st.reviewHistory.some(r=>r.date===ds);
    days.push({l:d.toLocaleDateString('en-US',{weekday:'short'}).slice(0,1),isT,act});
  }
  const qidx=Math.floor(Date.now()/86400000)%QUOTES.length;
  const smsg=st.streak===0?'Start today — your streak begins with the first word.':st.streak<7?`${st.streak} days in. You're forming the habit.`:st.streak<14?`${st.streak} days straight. This is becoming part of who you are.`:`${st.streak} days. Remarkable.`;
  return `<div>
    <div class="sgrid">
      <div class="stat"><div class="stat-n">${st.streak}</div><div class="stat-l">Day streak</div></div>
      <div class="stat"><div class="stat-n">${todayCount}</div><div class="stat-l">Today</div></div>
      <div class="stat"><div class="stat-n">${weekCount}</div><div class="stat-l">This week</div></div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:1.25rem;">
      <div style="font-size:13px;color:var(--color-text-secondary);">${h(smsg)}</div>
    </div>
    <div class="slbl">Last 7 days</div>
    <div class="wkrow">
      ${days.map(d=>`<div class="dayc${d.act?' act':''}${d.isT?' tod':''}">
        <span>${d.l}</span>${d.act?'<i class="ti ti-check" style="font-size:11px;" aria-hidden="true"></i>':'<span style="opacity:.3;">·</span>'}
      </div>`).join('')}
    </div>
    <div class="slbl">Word bank</div>
    <div style="font-size:14px;color:var(--color-text-secondary);margin-bottom:1.25rem;">${W.length} words · <span style="color:var(--color-text-primary);font-weight:500;">${totalAll} reviewed total</span></div>
    <div class="qbox">${h(QUOTES[qidx])}</div>
  </div>`;
}

function go(tab){
  st.tab=tab;
  if(tab==='quiz')st.qPhase='start';
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('tb-'+tab).classList.add('on');
  renderContent();
}

function renderContent(){
  let html='';
  if(st.tab==='today')html=renderToday();
  else if(st.tab==='quiz')html=renderQuiz();
  else if(st.tab==='explore')html=renderExplore();
  else if(st.tab==='progress')html=renderProgress();
  document.getElementById('content').innerHTML=html;
}

loadSt().then(()=>{updateHdr();renderContent();});
</script>
